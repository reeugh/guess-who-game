        <div class="tally">
            WINS: <span id="wins">0</span> | LOSSES: <span id="losses">0</span>
        </div>
        <div class="button-group">
            <button class="btn right" onclick="updateScore('wins')">CORRECT</button>

        </div>
        <button class="reset-btn" onclick="resetBoard()">RESET BOARD</button>
